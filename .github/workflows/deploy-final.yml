name: Deploy MOMO Final Cart Page

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-momo-final
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install
      - name: Build
        run: npm run build
        env:
          GITHUB_ACTIONS: true
      - name: Use cart-enabled entry page
        run: |
          mkdir -p dist/client
          cp public/index-cart.html dist/client/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Wait for older Pages deployments
        run: sleep 180
      - id: deployment
        uses: actions/deploy-pages@v4
